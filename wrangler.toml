name = "cr-master"

[build]
  command     = ""
  destination = "."

# Base de données D1 (SQLite géré par Cloudflare)
# Le script Genspark crée automatiquement "cr-master-db" lors du premier déploiement avec --rebuild-db.
# L'UUID est mis à jour automatiquement par le script.
[[d1_databases]]
  binding       = "DB"
  database_name = "cr-master-db"
  database_id   = "492ca7cf-c8d4-4e05-89f6-81f761232b5f"
