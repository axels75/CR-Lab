<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003399"/>
      <stop offset="100%" stop-color="#001233"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi navy -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Barre accent magenta en bas -->
  <rect x="4" y="26.5" width="24" height="2.5" rx="1.25" fill="#E8007D"/>

  <!-- Monogramme "CR" en blanc gras -->
  <text
    x="16"
    y="21"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-weight="900"
    font-size="14.5"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-0.5">CR</text>
</svg>
